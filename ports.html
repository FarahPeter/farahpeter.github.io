        .search-box { width: 100%; max-width: 800px; margin: 20px auto; display: block; background: var(--bg-main); color: var(--primary-hover); border: 1px solid var(--border-color); padding: 15px 20px; border-radius: 8px; font-size: 1.2rem; outline: none; transition: border-color 0.2s; }
        .search-box:focus { border-color: #3b82f6; }
        .port-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .port-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        [data-theme="light"] .port-card { background: rgba(0,0,0,0.02); }
        .p-num { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; color: #3b82f6; font-weight: bold; }
        .p-name { font-weight: bold; color: var(--primary-hover); }
        .p-desc { font-size: 0.85rem; color: var(--text-muted); }
        .vuln { border-left: 4px solid #ef4444; }
        .vuln .p-num { color: #ef4444; }
    </style>

    <header>
        <h1>Port Database</h1>
        <h2 class="page-subtitle">Quick reference for common TCP/UDP service ports.</h2>
    </header>
    <section class="reveal" style="padding: 0 20px;">
        <input type="text" id="search" class="search-box" placeholder="Search by port number or service (e.g., 443, SSH, DNS)...">
        <div class="port-grid" id="grid"></div>
    </section>
    <script src="script.js"></script>
    <script>
        const ports = [
            { p: "20, 21", n: "FTP", d: "File Transfer Protocol", v: false },
            { p: "22", n: "SSH", d: "Secure Shell", v: false },
            { p: "23", n: "Telnet", d: "Unencrypted text communications", v: true },
            { p: "25", n: "SMTP", d: "Simple Mail Transfer Protocol", v: false },
            { p: "53", n: "DNS", d: "Domain Name System", v: false },
            { p: "67, 68", n: "DHCP", d: "Dynamic Host Configuration", v: false },
            { p: "80", n: "HTTP", d: "Hypertext Transfer Protocol", v: false },
            { p: "110", n: "POP3", d: "Post Office Protocol v3", v: false },
            { p: "123", n: "NTP", d: "Network Time Protocol", v: false },
            { p: "143", n: "IMAP", d: "Internet Message Access Protocol", v: false },
            { p: "161, 162", n: "SNMP", d: "Simple Network Management", v: false },
            { p: "443", n: "HTTPS", d: "HTTP Secure (TLS/SSL)", v: false },
            { p: "445", n: "SMB", d: "Server Message Block", v: true },
            { p: "3389", n: "RDP", d: "Remote Desktop Protocol", v: true },
            { p: "8080", n: "HTTP-Alt", d: "Alternative Web Server port", v: false }
        ];

        const grid = document.getElementById('grid');
        const search = document.getElementById('search');

        function render(filter = "") {
            grid.innerHTML = "";
            const lowerFilter = filter.toLowerCase();
            ports.filter(pt => pt.p.includes(filter) || pt.n.toLowerCase().includes(lowerFilter) || pt.d.toLowerCase().includes(lowerFilter))
                 .forEach(pt => {
                     const div = document.createElement('div');
                     div.className = `port-card ${pt.v ? 'vuln' : ''}`;
                     div.innerHTML = `<div class="p-num">${pt.p}</div><div class="p-name">${pt.n}</div><div class="p-desc">${pt.d}</div>`;
                     grid.appendChild(div);
                 });
        }

        search.addEventListener('input', (e) => render(e.target.value));
        render();
    </script>
</body>
