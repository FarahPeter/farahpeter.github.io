<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Farah | DNS Lookup Tool</title>
    <meta name="description" content="Perform DNS lookups (A, AAAA, MX, TXT, CNAME, etc) directly from your browser.">
    <link rel="icon" type="image/x-icon" href="../Files/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-container { max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; gap: 20px; }
        .input-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; }
        [data-theme="light"] .input-panel { background: rgba(0, 0, 0, 0.015); }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }
        .input-group label { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        .text-input, select { background: var(--bg-main); color: var(--primary-hover); border: 1px solid var(--border-color); padding: 12px 15px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .text-input:focus, select:focus { border-color: #3b82f6; }
        .btn-lookup { padding: 12px 20px; font-size: 1rem; border-color: #3b82f6; color: #3b82f6; cursor: pointer; align-self: flex-end; }
        .btn-lookup:hover { background: #3b82f6; color: #000; }
        .output-panel { background: #050505; border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; min-height: 200px; position: relative; }
        [data-theme="light"] .output-panel { background: #f8fafc; }
        .output-text { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--text-main); white-space: pre-wrap; word-break: break-all; margin: 0; line-height: 1.5; }
        .loading { color: #facc15; }
        .error { color: #ef4444; }
        .success { color: #4ade80; }
    </style>
</head>
<body>
    <div id="system-status"><div class="status-dot"></div><span class="status-text">SYS</span></div>
    <nav>
        <button class="menu-toggle" id="mobile-menu-btn" aria-label="Toggle navigation">&#9776;</button>
        <ul id="nav-menu">
            <li>
                <a href="#" id="theme-toggle" aria-label="Toggle Theme">

                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </a>
            </li>
            <li><a href="../index.html" class="nav-highlight">Home / Profile</a></li>
            <li><a href="../fun.html" id="fun" class="nav-highlight">Interactive Hub</a></li>
        </ul>
    </nav>
    <header>
        <h1>DNS Lookup</h1>
        <h2 class="page-subtitle">Query DNS records for any domain directly from your browser.</h2>
    </header>
    <section class="reveal" style="padding: 0 20px;">
        <div class="tool-container">
            <div class="input-panel">
                <div class="input-group">
                    <label for="domain-input">Domain Name</label>
                    <input type="text" id="domain-input" class="text-input" placeholder="e.g. google.com">
                </div>
                <div class="input-group" style="flex: 0.5;">
                    <label for="record-type">Record Type</label>
                    <select id="record-type">
                        <option value="A">A (IPv4)</option>
                        <option value="AAAA">AAAA (IPv6)</option>
                        <option value="MX">MX (Mail)</option>
                        <option value="TXT">TXT (Text)</option>
                        <option value="CNAME">CNAME (Alias)</option>
                        <option value="NS">NS (Nameserver)</option>
                        <option value="ANY">ANY (All Records)</option>
                    </select>
                </div>
                <button class="btn btn-lookup" id="btn-lookup">Lookup ➔</button>
            </div>
            <div class="output-panel">
                <pre class="output-text" id="output-text">Results will appear here...</pre>
            </div>
        </div>
    </section>
    <script src="../script.js"></script>
    <script>
        const domainInput = document.getElementById('domain-input');
        const recordType = document.getElementById('record-type');
        const btnLookup = document.getElementById('btn-lookup');
        const outputText = document.getElementById('output-text');

        // Using Google's DNS-over-HTTPS API
        async function performLookup() {
            let domain = domainInput.value.trim();
            const type = recordType.value;

            if (!domain) {
                outputText.textContent = 'Please enter a valid domain name.';
                outputText.className = 'output-text error';
                return;
            }

            // Strip http/https
            domain = domain.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];

            outputText.textContent = `Looking up ${type} records for ${domain}...\n`;
            outputText.className = 'output-text loading';

            try {
                // Determine record type numeric value for Google DoH API
                const typeMap = { 'A': 1, 'NS': 2, 'CNAME': 5, 'MX': 15, 'TXT': 16, 'AAAA': 28, 'ANY': 255 };
                const typeVal = typeMap[type] || 1;

                const response = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=${typeVal}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                if (data.Status !== 0) {
                    outputText.textContent = `DNS Lookup Failed. Status Code: ${data.Status}\nDomain might not exist or record type is unavailable.`;
                    outputText.className = 'output-text error';
                    return;
                }

                if (!data.Answer || data.Answer.length === 0) {
                    outputText.textContent = `No ${type} records found for ${domain}.`;
                    outputText.className = 'output-text error';
                    return;
                }

                let resultStr = `[SUCCESS] Found ${data.Answer.length} records:\n\n`;
                resultStr += `NAME`.padEnd(30) + `TYPE`.padEnd(10) + `TTL`.padEnd(10) + `DATA\n`;
                resultStr += `--------------------------------------------------------------------------------\n`;

                data.Answer.forEach(record => {
                    // Map back type number to name
                    const rTypeNum = record.type;
                    const rTypeStr = Object.keys(typeMap).find(key => typeMap[key] === rTypeNum) || rTypeNum;

                    let rData = record.data;
                    if(rTypeStr === 'TXT' && rData.startsWith('"') && rData.endsWith('"')) {
                        rData = rData.substring(1, rData.length - 1);
                    }

                    resultStr += `${record.name}`.padEnd(30) + `${rTypeStr}`.padEnd(10) + `${record.TTL}`.padEnd(10) + `${rData}\n`;
                });

                outputText.textContent = resultStr;
                outputText.className = 'output-text success';

            } catch (error) {
                outputText.textContent = `Error performing lookup: ${error.message}`;
                outputText.className = 'output-text error';
            }
        }

        btnLookup.addEventListener('click', performLookup);
        domainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performLookup();
        });
    </script>
</body>
</html>
