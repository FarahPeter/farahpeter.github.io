<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Farah | Cron Translator & Builder</title>
    <meta name="description" content="Build and translate Cron expressions into human-readable schedules.">
    <link rel="icon" type="image/x-icon" href="Files/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-container { max-width: 1000px; margin: 20px auto; display: flex; flex-direction: column; gap: 25px; }

        /* Master Input & Output */
        .master-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color, #333); border-radius: 12px; padding: 30px; text-align: center; }
        [data-theme="light"] .master-panel { background: rgba(0, 0, 0, 0.015); }

        .cron-input { background: var(--bg-main, #0a0a0a); color: #fff; border: 2px solid var(--border-color, #444); padding: 15px 20px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; width: 100%; max-width: 600px; text-align: center; outline: none; transition: all 0.3s ease; letter-spacing: 0.1em; margin-bottom: 20px; }
        .cron-input.valid { border-color: #4ade80; color: #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.1); }
        .cron-input.invalid { border-color: #ef4444; color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.1); }

        .human-readable { font-size: 1.6rem; color: var(--primary-hover, #4ade80); line-height: 1.5; font-weight: 600; min-height: 60px; display: flex; align-items: center; justify-content: center;}
        .error-text { color: #ef4444; font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; }

        /* Intuitive Builder Grid */
        .builder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .builder-card { background: var(--bg-section, #111); border: 1px solid var(--border-color, #333); border-radius: 10px; padding: 20px; text-align: left; transition: border-color 0.2s; }
        .builder-card:hover { border-color: #555; }
        .card-header { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #4ade80; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; text-align: center; font-weight: bold;}

        /* Builder Controls */
        .option-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.9rem; color: #ccc; }
        .option-row label { cursor: pointer; user-select: none; flex-grow: 1; }
        .option-row input[type="radio"] { accent-color: #4ade80; cursor: pointer; width: 16px; height: 16px; margin: 0; }

        .number-input, .text-input { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; font-family: 'JetBrains Mono', monospace; outline: none; transition: border-color 0.2s; }
        .number-input { width: 50px; text-align: center; }
        .text-input { width: 80px; }
        .number-input:focus, .text-input:focus { border-color: #4ade80; }

        /* Small hint text */
        .hint { font-size: 0.7rem; color: #666; display: block; margin-top: -8px; margin-bottom: 10px; margin-left: 24px;}
    </style>
</head>
<body>
    <nav>
        <button class="menu-toggle" id="mobile-menu-btn" aria-label="Toggle navigation">&#9776;</button>
        <ul id="nav-menu">

                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>

    <header>
        <h1>Cron Translator & Builder</h1>
        <h2 class="page-subtitle">Zero knowledge required. Build complex schedules using the visual blocks below.</h2>
    </header>

    <section class="reveal" style="padding: 0 20px;">
        <div class="tool-container">

            <div class="master-panel">
                <input type="text" id="cron-input" class="cron-input" value="*/15 * * * *" spellcheck="false" autocomplete="off">
                <div id="output-text" class="human-readable">Loading...</div>
            </div>

            <div class="builder-grid" id="builder-form">

                <div class="builder-card">
                    <div class="card-header">Minute</div>
                    <div class="option-row">
                        <input type="radio" name="min-mode" value="*" id="min-every">
                        <label for="min-every">Every Minute</label>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="min-mode" value="step" id="min-step">
                        <label for="min-step">Every</label>
                        <input type="number" id="min-step-val" class="number-input" min="1" max="59" value="15">
                        <span>min</span>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="min-mode" value="exact" id="min-exact">
                        <label for="min-exact">Exactly at</label>
                        <input type="number" id="min-exact-val" class="number-input" min="0" max="59" value="0">
                    </div>
                    <span class="hint">(0-59)</span>
                    <div class="option-row">
                        <input type="radio" name="min-mode" value="custom" id="min-custom">
                        <label for="min-custom">Custom</label>
                        <input type="text" id="min-custom-val" class="text-input" placeholder="e.g. 1-5">
                    </div>
                </div>

                <div class="builder-card">
                    <div class="card-header">Hour</div>
                    <div class="option-row">
                        <input type="radio" name="hour-mode" value="*" id="hour-every" checked>
                        <label for="hour-every">Every Hour</label>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="hour-mode" value="step" id="hour-step">
                        <label for="hour-step">Every</label>
                        <input type="number" id="hour-step-val" class="number-input" min="1" max="23" value="2">
                        <span>hrs</span>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="hour-mode" value="exact" id="hour-exact">
                        <label for="hour-exact">Exactly at</label>
                        <input type="number" id="hour-exact-val" class="number-input" min="0" max="23" value="12">
                    </div>
                    <span class="hint">(0=Midnight, 23=11PM)</span>
                    <div class="option-row">
                        <input type="radio" name="hour-mode" value="custom" id="hour-custom">
                        <label for="hour-custom">Custom</label>
                        <input type="text" id="hour-custom-val" class="text-input" placeholder="e.g. 9-17">
                    </div>
                </div>

                <div class="builder-card">
                    <div class="card-header">Day</div>
                    <div class="option-row">
                        <input type="radio" name="dom-mode" value="*" id="dom-every" checked>
                        <label for="dom-every">Every Day</label>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="dom-mode" value="step" id="dom-step">
                        <label for="dom-step">Every</label>
                        <input type="number" id="dom-step-val" class="number-input" min="1" max="31" value="2">
                        <span>days</span>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="dom-mode" value="exact" id="dom-exact">
                        <label for="dom-exact">On the</label>
                        <input type="number" id="dom-exact-val" class="number-input" min="1" max="31" value="1">
                    </div>
                    <span class="hint">(1-31)</span>
                    <div class="option-row">
                        <input type="radio" name="dom-mode" value="custom" id="dom-custom">
                        <label for="dom-custom">Custom</label>
                        <input type="text" id="dom-custom-val" class="text-input" placeholder="e.g. 15,30">
                    </div>
                </div>

                <div class="builder-card">
                    <div class="card-header">Month</div>
                    <div class="option-row">
                        <input type="radio" name="month-mode" value="*" id="month-every" checked>
                        <label for="month-every">Every Month</label>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="month-mode" value="step" id="month-step">
                        <label for="month-step">Every</label>
                        <input type="number" id="month-step-val" class="number-input" min="1" max="12" value="3">
                        <span>mo</span>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="month-mode" value="exact" id="month-exact">
                        <label for="month-exact">Exactly</label>
                        <input type="number" id="month-exact-val" class="number-input" min="1" max="12" value="1">
                    </div>
                    <span class="hint">(1=Jan, 12=Dec)</span>
                    <div class="option-row">
                        <input type="radio" name="month-mode" value="custom" id="month-custom">
                        <label for="month-custom">Custom</label>
                        <input type="text" id="month-custom-val" class="text-input" placeholder="e.g. JAN-MAR">
                    </div>
                </div>

                <div class="builder-card">
                    <div class="card-header">Weekday</div>
                    <div class="option-row">
                        <input type="radio" name="dow-mode" value="*" id="dow-every" checked>
                        <label for="dow-every">Every Day</label>
                    </div>
                    <div class="option-row">
                        <input type="radio" name="dow-mode" value="exact" id="dow-exact">
                        <label for="dow-exact">Exactly</label>
                        <input type="number" id="dow-exact-val" class="number-input" min="0" max="6" value="1">
                    </div>
                    <span class="hint">(0=Sun, 6=Sat)</span>
                    <div class="option-row">
                        <input type="radio" name="dow-mode" value="custom" id="dow-custom">
                        <label for="dow-custom">Custom</label>
                        <input type="text" id="dow-custom-val" class="text-input" placeholder="e.g. 1-5">
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="../script.js"></script>
    <script>
        const cronInput = document.getElementById('cron-input');
        const outputText = document.getElementById('output-text');
        const builderForm = document.getElementById('builder-form');

        const partsData = ['min', 'hour', 'dom', 'month', 'dow'];

        // 1. Get value from a specific builder block
        function getBlockValue(part) {
            const mode = document.querySelector(`input[name="${part}-mode"]:checked`).value;
            if (mode === '*') return '*';
            if (mode === 'step') return '*/' + document.getElementById(`${part}-step-val`).value;
            if (mode === 'exact') return document.getElementById(`${part}-exact-val`).value;
            if (mode === 'custom') return document.getElementById(`${part}-custom-val`).value || '*';
            return '*';
        }

        // 2. Set UI state from a raw string part
        function setBlockValue(part, value) {
            if (value === '*') {
                document.getElementById(`${part}-every`).checked = true;
            } else if (value.startsWith('*/') && document.getElementById(`${part}-step`)) {
                document.getElementById(`${part}-step`).checked = true;
                document.getElementById(`${part}-step-val`).value = value.replace('*/', '');
            } else if (!isNaN(value) && document.getElementById(`${part}-exact`)) {
                document.getElementById(`${part}-exact`).checked = true;
                document.getElementById(`${part}-exact-val`).value = value;
            } else {
                // Fallback to custom for ranges (e.g., 1-5), lists (e.g., 1,2), or words (e.g., MON)
                document.getElementById(`${part}-custom`).checked = true;
                document.getElementById(`${part}-custom-val`).value = value;
            }
        }

        // 3. Build string from UI interactions
        function updateFromBuilder() {
            const newExpr = partsData.map(getBlockValue).join(' ');
            if (cronInput.value !== newExpr) {
                cronInput.value = newExpr;
                processCronText(newExpr);
            }
        }

        // 4. Update UI from manual string typing
        function syncBuilderFromInput() {
            const expr = cronInput.value.trim();
            const parts = expr.split(/\s+/);
            if (parts.length === 5) {
                partsData.forEach((part, idx) => {
                    setBlockValue(part, parts[idx]);
                });
            }
            processCronText(expr);
        }

        // Add event listeners
        builderForm.addEventListener('input', (e) => {
            // If they type in a number/text input, auto-select its corresponding radio button
            if (e.target.type === 'number' || e.target.type === 'text') {
                const radioId = e.target.id.replace('-val', '');
                document.getElementById(radioId).checked = true;
            }
            updateFromBuilder();
        });

        cronInput.addEventListener('input', syncBuilderFromInput);

        // 5. Basic Parser for Human Readable Output
        function processCronText(expr) {
            expr = expr.toLowerCase();
            const parts = expr.split(/\s+/);

            if (parts.length !== 5) {
                outputText.className = "error-text";
                outputText.textContent = "Invalid format. Expected 5 parameters.";
                cronInput.className = "cron-input invalid";
                return;
            }

            cronInput.className = "cron-input valid";
            const [min, hour, dom, month, dow] = parts;

            const format = (v, nameStr) => {
                if(v === '*') return '';
                if(v.startsWith('*/')) return `every ${v.replace('*/', '')} ${nameStr}s`;
                if(v.includes('-')) return v.replace('-', ' through ');
                return v;
            };

            let result = [];

            // Time
            if (min === '*' && hour === '*') result.push("Every minute");
            else if (min.startsWith('*/') && hour === '*') result.push(`Every ${min.replace('*/', '')} minutes`);
            else if (min === '0' && hour === '*') result.push("At the top of every hour");
            else if (hour === '*') result.push(`At minute ${min} past every hour`);
            else if (min === '*') result.push(`Every minute of hour ${hour}`);
            else result.push(`At ${hour.padStart(2, '0')}:${min.padStart(2, '0')}`);

            // Date
            if (dom !== '*') {
                if(dom.startsWith('*/')) result.push(`every ${dom.replace('*/','')} days`);
                else result.push(`on day ${format(dom, '')} of the month`);
            }

            // Month
            if (month !== '*') {
                if(month.startsWith('*/')) result.push(`every ${month.replace('*/','')} months`);
                else result.push(`in month ${format(month, '')}`);
            }

            // Weekday
            if (dow !== '*') {
                const prefix = (dom !== '*' || month !== '*') ? 'and ' : '';
                if (dow.match(/^[0-6]-[0-6]$/)) {
                    result.push(`${prefix}on days ${dow.replace('-', ' to ')} of the week`);
                } else {
                    result.push(`${prefix}on weekday ${dow}`);
                }
            }

            let text = result.join(', ') + '.';
            outputText.className = "human-readable";
            outputText.textContent = text.charAt(0).toUpperCase() + text.slice(1);
        }

        // Initialize state on page load
        syncBuilderFromInput();
    </script>
</body>
