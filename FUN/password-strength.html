<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Farah | Password Strength Checker</title>
    <meta name="description" content="Check the strength and entropy of your passwords locally.">
    <link rel="icon" type="image/x-icon" href="../Files/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-container { max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; gap: 20px; }
        .input-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        [data-theme="light"] .input-panel { background: rgba(0, 0, 0, 0.015); }
        .text-input { background: var(--bg-main); color: var(--primary-hover); border: 1px solid var(--border-color); padding: 15px 20px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; outline: none; transition: border-color 0.2s; width: 100%; box-sizing: border-box; }
        .text-input:focus { border-color: #3b82f6; }
        .meter-container { width: 100%; height: 10px; background: var(--bg-section); border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .meter-fill { height: 100%; width: 0%; background: #ef4444; transition: width 0.3s, background-color 0.3s; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-card { background: var(--bg-section); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--primary-hover); font-family: 'JetBrains Mono', monospace;}
        .feedback-list { margin-top: 20px; padding-left: 20px; color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
        .feedback-list li.good { color: #4ade80; list-style-type: '✓ '; }
        .feedback-list li.bad { color: #ef4444; list-style-type: '✗ '; }
        .feedback-list li.warn { color: #facc15; list-style-type: '! '; }
    </style>
</head>
<body>
    <nav>
        <button class="menu-toggle" id="mobile-menu-btn" aria-label="Toggle navigation">&#9776;</button>
        <ul id="nav-menu">
            <li>
                <a href="#" id="theme-toggle" aria-label="Toggle Theme">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </a>
            </li>
            <li><a href="../index.html" class="nav-highlight">Home / Profile</a></li>
            <li><a href="../fun.html" id="fun" class="nav-highlight">Interactive Hub</a></li>
        </ul>
    </nav>
    <header>
        <h1>Password Strength Checker</h1>
        <h2 class="page-subtitle">Analyze password strength locally. No data leaves your browser.</h2>
    </header>
    <section class="reveal" style="padding: 0 20px;">
        <div class="tool-container">
            <div class="input-panel">
                <input type="text" id="password-input" class="text-input" placeholder="Enter password to evaluate..." autocomplete="off">
                <div class="meter-container">
                    <div class="meter-fill" id="meter-fill"></div>
                </div>
                <div style="text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--text-muted);" id="strength-text">Very Weak</div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-title">Length</div>
                        <div class="stat-value" id="val-len">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Entropy</div>
                        <div class="stat-value" id="val-entropy">0 bits</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Crack Time (est)</div>
                        <div class="stat-value" id="val-time" style="font-size: 1rem;">Instant</div>
                    </div>
                </div>

                <ul class="feedback-list" id="feedback-list"></ul>
            </div>
        </div>
    </section>
    <script src="../script.js"></script>
    <script>
        const input = document.getElementById('password-input');
        const meter = document.getElementById('meter-fill');
        const strText = document.getElementById('strength-text');
        const lenVal = document.getElementById('val-len');
        const entVal = document.getElementById('val-entropy');
        const timeVal = document.getElementById('val-time');
        const feedbackList = document.getElementById('feedback-list');

        function formatTime(seconds) {
            if(seconds < 1) return "Instant";
            if(seconds < 60) return `${Math.round(seconds)} Seconds`;
            if(seconds < 3600) return `${Math.round(seconds/60)} Mins`;
            if(seconds < 86400) return `${Math.round(seconds/3600)} Hours`;
            if(seconds < 31536000) return `${Math.round(seconds/86400)} Days`;
            const years = seconds/31536000;
            if(years < 1000) return `${Math.round(years)} Years`;
            if(years < 1000000) return `${Math.round(years/1000)}k Years`;
            if(years < 1000000000) return `${Math.round(years/1000000)}M Years`;
            return `1B+ Years`;
        }

        input.addEventListener('input', () => {
            const pwd = input.value;
            const L = pwd.length;

            lenVal.textContent = L;

            if (L === 0) {
                meter.style.width = '0%';
                strText.textContent = 'None';
                entVal.textContent = '0 bits';
                timeVal.textContent = 'Instant';
                feedbackList.innerHTML = '';
                return;
            }

            let R = 0;
            const hasLower = /[a-z]/.test(pwd);
            const hasUpper = /[A-Z]/.test(pwd);
            const hasNum = /[0-9]/.test(pwd);
            const hasSym = /[^a-zA-Z0-9]/.test(pwd);

            if(hasLower) R += 26;
            if(hasUpper) R += 26;
            if(hasNum) R += 10;
            if(hasSym) R += 32;

            const entropy = L === 0 ? 0 : L * Math.log2(R);
            entVal.textContent = `${Math.round(entropy)} bits`;

            // Assume fast offline cracking speed: 100 Billion hashes/sec
            const combinations = Math.pow(2, entropy);
            const secondsToCrack = combinations / 100000000000;
            timeVal.textContent = formatTime(secondsToCrack);

            // Scoring
            let score = 0;
            if (entropy > 25) score++;
            if (entropy > 50) score++;
            if (entropy > 75) score++;
            if (entropy > 100) score++;

            // Penalty for common patterns (very basic)
            if (/^[a-zA-Z]+$/.test(pwd) || /^[0-9]+$/.test(pwd)) score = Math.max(0, score - 1);

            let percent = 0;
            let color = '#ef4444';
            let label = 'Very Weak';

            if (score === 0) { percent = 10; color = '#ef4444'; label = 'Very Weak'; }
            else if (score === 1) { percent = 30; color = '#f97316'; label = 'Weak'; }
            else if (score === 2) { percent = 50; color = '#facc15'; label = 'Moderate'; }
            else if (score === 3) { percent = 80; color = '#a3e635'; label = 'Strong'; }
            else if (score >= 4) { percent = 100; color = '#4ade80'; label = 'Very Strong'; }

            meter.style.width = `${percent}%`;
            meter.style.backgroundColor = color;
            strText.textContent = label;
            strText.style.color = color;

            // Feedback Generation
            feedbackList.innerHTML = '';

            const addFeedback = (msg, type) => {
                const li = document.createElement('li');
                li.textContent = msg;
                li.className = type;
                feedbackList.appendChild(li);
            };

            if (L < 8) addFeedback('Password is too short (minimum 8 characters recommended).', 'bad');
            else if (L >= 12) addFeedback('Good length (12+ characters).', 'good');

            if (!hasLower) addFeedback('Missing lowercase letters.', 'warn');
            if (!hasUpper) addFeedback('Missing uppercase letters.', 'warn');
            if (!hasNum) addFeedback('Missing numbers.', 'warn');
            if (!hasSym) addFeedback('Missing symbols or special characters.', 'warn');

            if (hasLower && hasUpper && hasNum && hasSym) addFeedback('Uses a good variety of character types.', 'good');

            if (/^[a-zA-Z]+$/.test(pwd) && L > 0) addFeedback('Only contains letters. Easily dictionary attacked.', 'bad');
            if (/^[0-9]+$/.test(pwd) && L > 0) addFeedback('Only contains numbers. Easily brute-forced.', 'bad');
            if (/(.)\1{2,}/.test(pwd)) addFeedback('Contains repeated characters (e.g. "aaa").', 'warn');
            if (/123|abc|qwerty|password/i.test(pwd)) addFeedback('Contains a common sequence or word.', 'bad');
        });
    </script>
</body>
</html>
