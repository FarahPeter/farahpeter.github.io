<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Farah | Secure Password Generator</title>
    <meta name="description" content="Generate strong, secure, and customizable passwords instantly.">
    <link rel="icon" type="image/x-icon" href="../Files/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-container { max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; gap: 20px; }
        .output-panel { background: #050505; border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; position: relative; min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; }
        [data-theme="light"] .output-panel { background: #f8fafc; }
        .password-output { font-family: 'JetBrains Mono', monospace; font-size: 2rem; color: #4ade80; word-break: break-all; margin: 0; padding-right: 50px; line-height: 1.2; letter-spacing: 0.05em; }
        .copy-btn { position: absolute; top: 20px; right: 20px; background: var(--bg-section); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; padding: 8px 12px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; transition: all 0.2s; }
        .copy-btn:hover { border-color: #4ade80; color: #4ade80; }
        .input-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; display: flex; flex-direction: column; gap: 25px; }
        [data-theme="light"] .input-panel { background: rgba(0, 0, 0, 0.015); }
        .slider-container { display: flex; align-items: center; gap: 15px; }
        .slider-container input[type="range"] { flex: 1; accent-color: #4ade80; cursor: pointer; }
        .slider-val { font-family: 'JetBrains Mono', monospace; color: #4ade80; font-weight: bold; width: 40px; font-size: 1.2rem; text-align: right; }
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        .checkbox-row input { accent-color: #4ade80; width: 18px; height: 18px; cursor: pointer; }
        .checkbox-row span { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; color: var(--text-main); }
        .generate-btn { padding: 15px; font-size: 1.1rem; border-color: #4ade80; color: #4ade80; margin-top: 10px; }
        .generate-btn:hover { background: #4ade80; color: #000; }
        .input-group label { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block;}
    </style>
</head>
<body>
    <nav>
        <button class="menu-toggle" id="mobile-menu-btn" aria-label="Toggle navigation">&#9776;</button>
        <ul id="nav-menu">
            <li>
                <a href="#" id="theme-toggle" aria-label="Toggle Theme">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </a>
            </li>
            <li><a href="../index.html" class="nav-highlight">Home / Profile</a></li>
            <li><a href="../fun.html" id="fun" class="nav-highlight">Interactive Hub</a></li>
        </ul>
    </nav>
    <header>
        <h1>Password Generator</h1>
        <h2 class="page-subtitle">Create strong, secure passwords locally.</h2>
    </header>
    <section class="reveal" style="padding: 0 20px;">
        <div class="tool-container">
            <div class="output-panel">
                <div class="password-output" id="password-output">Click Generate</div>
                <button class="copy-btn" id="btn-copy">Copy</button>
            </div>
            <div class="input-panel">
                <div class="input-group">
                    <label for="length-slider">Password Length</label>
                    <div class="slider-container">
                        <input type="range" id="length-slider" min="8" max="64" value="16">
                        <span class="slider-val" id="length-val">16</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Character Sets</label>
                    <div class="checkbox-group">
                        <label class="checkbox-row"><input type="checkbox" id="chk-upper" checked><span>Uppercase (A-Z)</span></label>
                        <label class="checkbox-row"><input type="checkbox" id="chk-lower" checked><span>Lowercase (a-z)</span></label>
                        <label class="checkbox-row"><input type="checkbox" id="chk-nums" checked><span>Numbers (0-9)</span></label>
                        <label class="checkbox-row"><input type="checkbox" id="chk-syms" checked><span>Symbols (!@#$%)</span></label>
                    </div>
                </div>
                <button class="btn generate-btn" id="btn-generate">🔄 Generate New Password</button>
            </div>
        </div>
    </section>
    <script src="../script.js"></script>
    <script>
        const lenSlider = document.getElementById('length-slider');
        const lenVal = document.getElementById('length-val');
        const chkUpper = document.getElementById('chk-upper');
        const chkLower = document.getElementById('chk-lower');
        const chkNums = document.getElementById('chk-nums');
        const chkSyms = document.getElementById('chk-syms');
        const output = document.getElementById('password-output');
        const btnGen = document.getElementById('btn-generate');
        const btnCopy = document.getElementById('btn-copy');

        const upperSet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerSet = "abcdefghijklmnopqrstuvwxyz";
        const numSet = "0123456789";
        const symSet = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        function generatePassword() {
            let charset = "";
            let password = "";

            if (chkUpper.checked) charset += upperSet;
            if (chkLower.checked) charset += lowerSet;
            if (chkNums.checked) charset += numSet;
            if (chkSyms.checked) charset += symSet;

            if (charset === "") {
                output.textContent = "Select a character set!";
                output.style.color = "#ef4444";
                return;
            }

            output.style.color = "#4ade80";
            const length = parseInt(lenSlider.value);

            // Use Web Crypto API for secure randomness
            const array = new Uint32Array(length);
            window.crypto.getRandomValues(array);

            for (let i = 0; i < length; i++) {
                password += charset[array[i] % charset.length];
            }

            output.textContent = password;
        }

        lenSlider.addEventListener('input', () => {
            lenVal.textContent = lenSlider.value;
            generatePassword();
        });

        [chkUpper, chkLower, chkNums, chkSyms].forEach(chk => {
            chk.addEventListener('change', generatePassword);
        });

        btnGen.addEventListener('click', generatePassword);

        btnCopy.addEventListener('click', () => {
            if (output.textContent !== "Click Generate" && output.textContent !== "Select a character set!") {
                navigator.clipboard.writeText(output.textContent).then(() => {
                    btnCopy.textContent = 'Copied!';
                    setTimeout(() => btnCopy.textContent = 'Copy', 2000);
                });
            }
        });

        generatePassword();
    </script>
</body>
</html>
